name: Weekly Gitea backup

# Runs a full weekly backup of every public repository of the BAL Gitea
# organisation into this GitHub repository.
#
# IMPORTANT: the job writes back to this repo using the automatic GITHUB_TOKEN,
# NOT a personal access token. The Gitea source is public, so no credentials
# are needed to read it. This means the weekly backup keeps working forever,
# even after the personal token used for the initial setup has been revoked.

on:
  # Every Sunday at 03:17 UTC. The odd minute avoids the top-of-hour spike
  # when GitHub queues many scheduled jobs (and may delay them).
  schedule:
    - cron: "17 3 * * 0"
  # Allow running it manually from the Actions tab.
  workflow_dispatch:

# Least-privilege: the job writes commits to this repository and, on failure,
# opens/updates an alert issue.
permissions:
  contents: write
  issues: write

concurrency:
  group: gitea-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      GITEA_BASE: https://bitcoin-after.life/gitea
      GITEA_ORG: bitcoinafterlife
    steps:
      - name: Checkout backup repository
        uses: actions/checkout@v4

      - name: Run Gitea backup
        run: |
          chmod +x scripts/backup_from_gitea.sh
          ./scripts/backup_from_gitea.sh

      - name: Commit and push backup
        run: |
          git config user.name  "BAL Backup Bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Weekly Gitea backup: $(date -u '+%Y-%m-%d %H:%M:%S') UTC"
          # Push using the automatic GITHUB_TOKEN (survives PAT revocation).
          git push origin HEAD:main

      # If any step above failed, open (or reuse) an alert issue so the failure
      # is not silent. Re-runs that succeed will close the open alert.
      - name: Open alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'backup-failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = 'Weekly Gitea backup failed';
            const body = [
              'The scheduled Gitea backup workflow failed.',
              '',
              `- Run: ${runUrl}`,
              `- Triggered by: \`${context.eventName}\``,
              `- Date (UTC): ${new Date().toISOString()}`,
              '',
              'Please check the workflow logs. This issue will be closed automatically',
              'on the next successful backup.',
            ].join('\n');

            // Reuse an already-open alert issue instead of spamming new ones.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
            }

      # On a successful run, close any open backup-failure alert.
      - name: Close alert issue on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'backup-failure';
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            for (const issue of open.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Backup succeeded again (run ${context.runId}). Closing this alert.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
